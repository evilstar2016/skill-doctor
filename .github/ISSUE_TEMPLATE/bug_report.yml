name: Bug report
description: Report a reproducible bug in the CLI.
title: "[bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal steps or command output. Redact private data.
      placeholder: |
        1. Run `npx @evilstar2025/skill-doctor scan`
        2. See error ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: skill-doctor version
      placeholder: "0.3.1"
    validations:
      required: false
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "20.19.0"
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, shell, package manager, and relevant agent platforms.
    validations:
      required: false
