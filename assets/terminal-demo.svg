<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">skill-doctor terminal demo</title>
  <desc id="desc">A terminal screenshot showing skill-doctor detecting duplicate skills, conflicts, and security risks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#101820"/>
      <stop offset="100%" stop-color="#16212b"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="960" height="560" rx="0" fill="#f4f7f8"/>
  <rect x="48" y="44" width="864" height="472" rx="8" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="48" y="44" width="864" height="44" rx="8" fill="#0c131a"/>
  <circle cx="76" cy="66" r="6" fill="#ff5f57"/>
  <circle cx="98" cy="66" r="6" fill="#ffbd2e"/>
  <circle cx="120" cy="66" r="6" fill="#28c840"/>
  <text x="150" y="72" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#8fa3b5">skill-doctor dashboard</text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">
    <text x="78" y="126" fill="#8fd6ff">$ npx @evilstar2025/skill-doctor scan</text>
    <text x="78" y="174" fill="#f7fbff" font-size="23" font-weight="700">SKILL DOCTOR REPORT</text>
    <text x="78" y="214" fill="#c6d3dd">Total skills installed: </text>
    <text x="338" y="214" fill="#ffffff" font-weight="700">15</text>
    <text x="78" y="248" fill="#c6d3dd">Duplicates detected:   </text>
    <text x="338" y="248" fill="#ffcc66" font-weight="700">1</text>
    <text x="78" y="282" fill="#c6d3dd">Conflicts detected:    </text>
    <text x="338" y="282" fill="#ff8a80" font-weight="700">2</text>
    <text x="78" y="316" fill="#c6d3dd">Security findings:     </text>
    <text x="338" y="316" fill="#ff8a80" font-weight="700">2</text>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">
    <rect x="484" y="126" width="344" height="72" rx="8" fill="#172a35" stroke="#2a4655"/>
    <text x="508" y="156" fill="#ffcc66" font-weight="700">DUPLICATE</text>
    <text x="508" y="182" fill="#dce7ee">ppt-master in global + project paths</text>

    <rect x="484" y="222" width="344" height="88" rx="8" fill="#271d24" stroke="#5a3344"/>
    <text x="508" y="252" fill="#ff8a80" font-weight="700">CONFLICT</text>
    <text x="508" y="278" fill="#dce7ee">git-workflow overlaps github-automation</text>

    <rect x="484" y="334" width="344" height="96" rx="8" fill="#211f16" stroke="#4d4527"/>
    <text x="508" y="364" fill="#ffcc66" font-weight="700">SECURITY AUDIT</text>
    <text x="508" y="390" fill="#dce7ee">secret leak + network call patterns</text>
  </g>

  <text x="78" y="456" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#9fb2c3">Works locally. No skill upload required.</text>
  <text x="78" y="484" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#9fb2c3">Scan Claude Code, Cursor, Copilot, Codex, Gemini CLI, Windsurf, Kiro, Trae, OpenCode, and more.</text>
</svg>
